name: Supabase heartbeat and backup

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Heartbeat Supabase and dump player rows (fails loud if backup is blind)
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node .github/scripts/supabase-heartbeat-backup.mjs

      - name: Commit backup and status (runs even on failure so the status trail is honest)
        if: always()
        run: |
          if [ -z "$(git status --porcelain -- backups/)" ]; then
            echo "No backup changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backups/
          git commit -m "backup: daily Supabase player rows + status"
          git push
