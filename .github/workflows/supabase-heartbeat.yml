name: Supabase heartbeat and backup

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Heartbeat Supabase and dump player rows
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node .github/scripts/supabase-heartbeat-backup.mjs

      - name: Commit backup if changed
        run: |
          if [ -z "$(git status --porcelain -- backups/focus-hero-supabase-players.json)" ]; then
            echo "No Supabase row changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backups/focus-hero-supabase-players.json
          git commit -m "backup: daily Supabase player rows"
          git push
