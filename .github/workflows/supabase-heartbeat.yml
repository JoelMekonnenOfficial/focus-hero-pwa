name: Supabase heartbeat and backup readiness

on:
  schedule:
    - cron: "17 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify Supabase metadata without exporting player rows
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node .github/scripts/supabase-heartbeat-backup.mjs

      - name: Commit aggregate status (runs even on failure so the trail is honest)
        if: always()
        run: |
          if [ -z "$(git status --porcelain -- backups/backup-status.json)" ]; then
            echo "No aggregate status changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- backups/backup-status.json
          git commit -m "ops: daily Supabase aggregate status"
          git push
